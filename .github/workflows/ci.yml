name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26-arm64
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app
      - name: Get Syphon submodule hash
        id: syphon-hash
        run: echo "hash=$(git submodule status Vendor/Syphon-Framework | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - name: Cache Syphon.xcframework
        id: cache-syphon
        uses: actions/cache@v5
        with:
          path: Frameworks/Syphon.xcframework
          key: syphon-xcframework-${{ steps.syphon-hash.outputs.hash }}-${{ hashFiles('scripts/build-syphon.sh') }}
      - name: Build Syphon
        if: steps.cache-syphon.outputs.cache-hit != 'true'
        run: make setup
      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: .build/artifacts
          key: spm-deps-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-deps-
      - name: Build
        run: swift build
      - name: Test with Coverage
        run: swift test --enable-code-coverage
      - name: Verify llms.txt is up to date
        run: |
          make llms-txt
          if ! git diff --quiet llms.txt; then
            echo "::error::llms.txt is out of date. Run 'make llms-txt' and commit the result."
            git diff llms.txt
            exit 1
          fi
      - name: Validate CLAUDE.md references
        run: ./scripts/validate-claude-md.sh
      - name: Coverage Report
        if: always()
        run: |
          BIN=$(find .build/debug -name 'metaphorPackageTests' -type f | head -1)
          if [ -n "$BIN" ] && [ -f .build/debug/codecov/default.profdata ]; then
            xcrun llvm-cov report "$BIN" \
              -instr-profile=.build/debug/codecov/default.profdata \
              -ignore-filename-regex='Tests/|\.build/'
          fi
