name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Required for the Release workflow to fire CI on release/<tag> branches.
  # GITHUB_TOKEN-created PRs do not trigger pull_request, but workflow_dispatch
  # is exempt from that restriction so we can re-enter CI explicitly.
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    permissions:
      contents: write  # Required to auto-push regenerated examples index back to PR branches.
      actions: write   # Required to re-dispatch CI after the auto-push (GITHUB_TOKEN pushes don't trigger workflows).
      statuses: write  # Required to bridge workflow_dispatch runs to a legacy Status for the ruleset gate.
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          # Need history for diffing against the push base / PR base to decide
          # whether to run the llms.txt staleness check.
          fetch-depth: 0
          # Don't leave the token in .git/config for every later step; the
          # auto-push step authenticates explicitly with its own token.
          persist-credentials: false
      - name: Detect Source changes
        id: source-changed
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          # Initial push (no prior tip) — assume Sources may have changed.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # After a force push the old tip can be unreachable; fall back to
          # assuming Sources changed rather than failing the whole job.
          if ! changed_files=$(git diff --name-only "$base" "$head" \
              -- 'Sources/**/*.swift' 'scripts/generate-llms-txt.py' 2>/dev/null); then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Trigger the llms.txt staleness check when either the inputs
          # (Sources/) or the generator script change.
          if echo "$changed_files" | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Check cross-repo contract
        run: ./scripts/check-contract.sh
      - name: Check CONTRACT.md identity across repos
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/check-contract-identity.sh
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app
      - name: Get Syphon submodule hash
        id: syphon-hash
        run: echo "hash=$(git submodule status Vendor/Syphon-Framework | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - name: Cache Syphon.xcframework
        id: cache-syphon
        uses: actions/cache@v5
        with:
          path: Frameworks/Syphon.xcframework
          key: syphon-xcframework-${{ steps.syphon-hash.outputs.hash }}-${{ hashFiles('scripts/build-syphon.sh') }}
      - name: Build Syphon
        if: steps.cache-syphon.outputs.cache-hit != 'true'
        run: make setup
      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: .build/artifacts
          key: spm-deps-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-deps-
      - name: Build
        run: swift build -Xswiftc -warnings-as-errors
      - name: Test with Coverage
        run: swift test --enable-code-coverage -Xswiftc -warnings-as-errors
      - name: Verify llms.txt is up to date
        if: steps.source-changed.outputs.changed == 'true'
        run: |
          make llms-txt
          if ! git diff --quiet llms.txt; then
            echo "::error::llms.txt is out of date. Run 'make llms-txt' and commit the result."
            git diff llms.txt
            exit 1
          fi
      - name: Auto-regenerate examples index (PR only)
        # Only run for PRs from the same repository — fork PRs can't push back
        # because the GITHUB_TOKEN is restricted to read-only on forks.
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          # Passed via env (not inline interpolation) so branch names containing
          # shell metacharacters can't inject into this script.
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          # Default checkout is the merge commit. Switch to the PR head branch
          # so we can commit + push back without rebasing.
          git fetch origin "$HEAD_REF"
          git checkout -B "$HEAD_REF" "origin/$HEAD_REF"

          python3 scripts/generate-examples-index.py

          if git diff --quiet docs/ai/examples-index.md docs/ai/examples-index.json; then
            echo "Examples index up to date."
            exit 0
          fi

          echo "Examples index out of date — regenerating and pushing back to $HEAD_REF."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ai/examples-index.md docs/ai/examples-index.json
          git commit -m "ci: regenerate examples index"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:$HEAD_REF"
          # GITHUB_TOKEN pushes do NOT fire push/pull_request workflows (GitHub
          # recursion guard), so the new head SHA would never receive the
          # required build-and-test check and the PR would become unmergeable.
          # workflow_dispatch is exempt from the guard — re-enter CI explicitly,
          # same trick the Release workflow uses.
          gh workflow run ci.yml --ref "$HEAD_REF"
          # Continue so the immediate validate step also passes locally on this
          # runner; the dispatched run validates (and statuses) the new SHA.
      - name: Validate AI-facing docs
        run: ./scripts/validate-ai-docs.sh
      - name: Bridge to legacy status (workflow_dispatch only)
        # Repository rulesets on personal repos evaluate required_status_checks
        # against the legacy Statuses API. pull_request runs satisfy it through
        # the normal path, but workflow_dispatch runs (release branches, the
        # examples-index auto-push re-dispatch above) only produce a check_run,
        # so mirror the green result as a status on the commit we just tested.
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=success \
            -f context=build-and-test \
            -f description="CI passed via workflow_dispatch run"
      - name: Coverage Report
        if: always()
        run: |
          BIN=$(find .build/debug -name 'metaphorPackageTests' -type f | head -1)
          if [ -n "$BIN" ] && [ -f .build/debug/codecov/default.profdata ]; then
            xcrun llvm-cov report "$BIN" \
              -instr-profile=.build/debug/codecov/default.profdata \
              -ignore-filename-regex='Tests/|\.build/'
          fi
