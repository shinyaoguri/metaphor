name: Examples Sweep

# Examples（271 パッケージ）は per-PR CI では検証しない（各 example が独立した
# SwiftPM パッケージで metaphor をフルビルドするためコストが高い。ci.yml の
# コメント参照）。代わりに:
#   - 週次: 代表セット（scripts/ci-smoke-examples.txt、~19 件）をビルドして
#     公開 API ドリフトを検出する
#   - 手動: workflow_dispatch の full=true で全数スイープ
#   - リリース前: release.yml が同じ代表セットをビルドする
# 失敗はこの workflow の失敗として可視化される（Issue #147）。
on:
  schedule:
    - cron: '0 21 * * 5'   # 毎週土曜 06:00 JST（金曜 21:00 UTC）
  workflow_dispatch:
    inputs:
      full:
        description: 'Build ALL examples instead of the smoke subset'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: examples-sweep
  cancel-in-progress: true

jobs:
  sweep:
    runs-on: macos-26
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app
      - name: Get Syphon submodule hash
        id: syphon-hash
        run: echo "hash=$(git submodule status Vendor/Syphon-Framework | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - name: Cache Syphon.xcframework
        id: cache-syphon
        uses: actions/cache@v6
        with:
          path: Frameworks/Syphon.xcframework
          key: syphon-xcframework-${{ steps.syphon-hash.outputs.hash }}-${{ hashFiles('scripts/build-syphon.sh') }}
      - name: Build Syphon
        if: steps.cache-syphon.outputs.cache-hit != 'true'
        run: make setup
      - name: Build examples
        run: |
          if [ "${{ inputs.full }}" = "true" ]; then
            ./scripts/run-examples.sh --build-only
          else
            ./scripts/run-examples.sh --build-only --smoke
          fi
