name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'Sources/**'
      - 'Package.swift'
      - 'Package.resolved'
      - 'website/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app
      - name: Get Syphon submodule hash
        id: syphon-hash
        run: echo "hash=$(git submodule status Vendor/Syphon-Framework | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - name: Get Xcode version
        id: xcode-version
        run: echo "version=$(xcodebuild -version | head -1 | tr ' ' '-')" >> "$GITHUB_OUTPUT"
      - name: Cache Syphon.xcframework
        id: cache-syphon
        uses: actions/cache@v6
        with:
          path: Frameworks/Syphon.xcframework
          key: syphon-xcframework-${{ steps.syphon-hash.outputs.hash }}-${{ hashFiles('scripts/build-syphon.sh') }}-${{ steps.xcode-version.outputs.version }}
      - name: Build Syphon
        if: steps.cache-syphon.outputs.cache-hit != 'true'
        run: make setup
      - name: Build Library and extract symbol graphs (parallel)
        run: make symbol-graphs
      - name: Build DocC Documentation
        run: |
          xcrun docc convert Sources/metaphor/metaphor.docc \
            --additional-symbol-graph-dir .build/symbol-graphs \
            --transform-for-static-hosting \
            --hosting-base-path metaphor \
            --output-path .build/docs
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
      - name: Build Landing Page
        run: |
          cd website
          npm ci
          npm run build
      - name: Merge DocC into Astro output
        run: |
          # Copy DocC directories into Astro output
          for dir in documentation data css js img index tutorials; do
            if [ -d ".build/docs/$dir" ]; then
              cp -R ".build/docs/$dir" "website/dist/$dir"
            fi
          done
          # Copy DocC's SPA fallback for client-side routing
          cp .build/docs/documentation/metaphor/index.html website/dist/404.html
          # Disable Jekyll processing
          touch website/dist/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
