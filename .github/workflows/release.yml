name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease   # increment N in vX.Y.Z-LABEL.N (latest tag must be a prerelease)
      prerelease_label:
        description: 'Pre-release label (beta, rc, alpha). Empty = stable. Ignored when bump=prerelease.'
        required: false
        type: string
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# release:* ラベル付き PR を短時間に複数マージすると release.yml が並走し、
# 同じ latest tag から同じ TAG_NAME / release/<tag> ブランチを計算して衝突する。
# 直列化する（後着はキャンセルせずキュー）。
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: write    # required to dispatch CI workflow on the release branch
  statuses: write   # required to bridge check_runs → legacy Status for the ruleset

jobs:
  release:
    runs-on: macos-14
    steps:
      # GITHUB_TOKEN-only flow:
      #
      # - GITHUB_TOKEN cannot bypass branch protection on personal repos.
      # - GITHUB_TOKEN-created PRs do NOT trigger pull_request workflows
      #   (recursion guard), but workflow_dispatch IS exempt from that guard.
      # - So we open the release PR with GITHUB_TOKEN, kick CI explicitly via
      #   `gh workflow run ci.yml --ref <release-branch>`, wait for green,
      #   merge through the standard PR API, then tag.
      #
      # No PAT, no ruleset bypass-actor games.
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # --- Syphon build ---
      - name: Get Syphon submodule hash
        id: syphon-hash
        run: echo "hash=$(git submodule status Vendor/Syphon-Framework | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      # release は macos-14 + デフォルト Xcode、CI/docs は macos-26 + Xcode 26.4。
      # キーに Xcode 版を含め、環境違いのキャッシュ共有を防ぐ
      - name: Get Xcode version
        id: xcode-version
        run: echo "version=$(xcodebuild -version | head -1 | tr ' ' '-')" >> "$GITHUB_OUTPUT"

      - name: Cache Syphon.xcframework
        id: cache-syphon
        uses: actions/cache@v6
        with:
          path: Frameworks/Syphon.xcframework
          key: syphon-xcframework-${{ steps.syphon-hash.outputs.hash }}-${{ hashFiles('scripts/build-syphon.sh') }}-${{ steps.xcode-version.outputs.version }}

      - name: Build Syphon.xcframework
        if: steps.cache-syphon.outputs.cache-hit != 'true'
        run: ./scripts/build-syphon.sh

      - name: Create ZIP and checksum
        run: |
          cd Frameworks
          zip -r Syphon.xcframework.zip Syphon.xcframework
          shasum -a 256 Syphon.xcframework.zip > checksum.txt
          echo "CHECKSUM=$(awk '{print $1}' checksum.txt)" >> $GITHUB_ENV

      # --- Examples smoke build（API ドリフトゲート） ---
      # Examples は per-PR CI では検証されない（コスト。ci.yml 参照）ため、
      # 少なくともリリース前には代表セットのビルドで壊れた example を検出する
      # （Issue #147）。失敗するとタグ・Release の発行前に止まる。
      - name: Smoke-build representative examples
        run: ./scripts/run-examples.sh --build-only --smoke

      # run-examples.sh はビルドエラーの詳細をログファイルにしか書かないため、
      # 失敗時はステップ出力へ吐き出す（これがないとランナー内で消えて診断不能）
      - name: Show example build errors
        if: failure()
        run: cat /tmp/metaphor-examples.log || true

      # --- Compute next version ---
      - name: Compute next version
        run: |
          set -euo pipefail
          BUMP="${{ github.event.inputs.bump }}"
          LABEL="${{ github.event.inputs.prerelease_label }}"

          if [ "$BUMP" = "prerelease" ]; then
            # Pick the highest prerelease tag by version order. `git describe`
            # returns the topologically nearest tag, which can be a stable tag
            # (or the wrong cycle) once stable and prerelease tags interleave.
            LATEST_PRE=$(git tag -l 'v*-*' | sort -V | tail -1 || true)
            if [[ "$LATEST_PRE" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+)-([a-zA-Z]+)\.([0-9]+)$ ]]; then
              BASE="${BASH_REMATCH[1]}"
              PRE_LABEL="${BASH_REMATCH[2]}"
              N="${BASH_REMATCH[3]}"
              if git rev-parse "$BASE" >/dev/null 2>&1; then
                echo "::error::Prerelease cycle ${BASE}-${PRE_LABEL} already graduated to stable ${BASE}. Use bump=patch/minor/major with prerelease_label to start a new cycle."
                exit 1
              fi
              TAG_NAME="${BASE}-${PRE_LABEL}.$((N + 1))"
            else
              echo "::error::bump=prerelease requires an existing prerelease tag (got '${LATEST_PRE:-none}'). Use bump=patch/minor/major with prerelease_label to start a new prerelease cycle."
              exit 1
            fi
          else
            # Find latest STABLE tag (no '-' suffix). sort -V handles version ordering.
            LATEST_STABLE=$(git tag -l 'v*' | grep -v -- '-' | sort -V | tail -1 || true)
            LATEST_STABLE=${LATEST_STABLE:-v0.0.0}
            VERSION=${LATEST_STABLE#v}
            IFS=. read -r MAJOR MINOR PATCH <<< "$VERSION"
            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            TARGET="v${MAJOR}.${MINOR}.${PATCH}"

            if [ -n "$LABEL" ]; then
              # Find next free vTARGET-LABEL.N
              N=1
              while git rev-parse "${TARGET}-${LABEL}.${N}" >/dev/null 2>&1; do
                N=$((N + 1))
              done
              TAG_NAME="${TARGET}-${LABEL}.${N}"
            else
              TAG_NAME="$TARGET"
            fi
          fi

          echo "Computed tag: $TAG_NAME"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_BRANCH=release/$TAG_NAME" >> "$GITHUB_ENV"
          if [[ "$TAG_NAME" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      # --- Push release branch with version-bump commit ---
      - name: Push release branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$RELEASE_BRANCH"
          sed -i '' "s|releases/download/v[^/]*/|releases/download/${TAG_NAME}/|g" Package.swift
          sed -i '' "s|checksum: \"[^\"]*\"|checksum: \"${CHECKSUM}\"|g" Package.swift
          # Bump the runtime version constant for EVERY release (stable and
          # prerelease) so a running sketch reports its exact metaphor version.
          VERSION_NUM=${TAG_NAME#v}
          sed -i '' "s|public static let version = \"[^\"]*\"|public static let version = \"${VERSION_NUM}\"|" \
            Sources/MetaphorCore/Core/MetaphorVersion.swift
          # Only stable versions appear in `from:` install snippets. Keep every
          # file that carries the snippet in sync — CI on this release branch
          # enforces agreement (validate-ai-docs.sh check #6 compares
          # GettingStarted.md and llms.txt against README.md, and the llms.txt
          # staleness check regenerates with the README version embedded), so
          # updating README.md alone deadlocks the release.
          if [ "$IS_PRERELEASE" = "false" ]; then
            VERSION_NUM=${TAG_NAME#v}
            # Anchor on the dependency URL so unrelated `from:` parameter
            # labels (e.g. tween(from:to:)) in llms.txt are left alone.
            sed -i '' "s|metaphor\.git\", from: \"[0-9][^\"]*\"|metaphor.git\", from: \"${VERSION_NUM}\"|g" \
              README.md \
              Sources/metaphor/metaphor.docc/GettingStarted.md \
              llms.txt
          fi
          git add Package.swift Sources/MetaphorCore/Core/MetaphorVersion.swift README.md Sources/metaphor/metaphor.docc/GettingStarted.md llms.txt
          if git diff --cached --quiet; then
            echo "::error::No version-bump diff produced."
            exit 1
          fi
          git commit -m "Release ${TAG_NAME}"
          git push origin "$RELEASE_BRANCH"

      # --- Open PR, kick CI manually, wait, merge ---
      - name: Open PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "$RELEASE_BRANCH" \
            --title "Release ${TAG_NAME}" \
            --body "Automated release commit for ${TAG_NAME}. Bumps Package.swift binary target${{ env.IS_PRERELEASE == 'false' && ' and the install snippets (README.md, GettingStarted.md, llms.txt)' || '' }}.")
          echo "PR_NUMBER=${PR_URL##*/}" >> "$GITHUB_ENV"

      - name: Trigger CI on release branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GITHUB_TOKEN-created PRs do not fire the pull_request CI, but
          # workflow_dispatch IS allowed to fire even from another workflow.
          # Capture an ISO timestamp BEFORE the dispatch so we can later
          # filter for the run we just kicked instead of accidentally
          # picking up a prior completed run on a recycled branch name.
          DISPATCH_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "DISPATCH_AT=$DISPATCH_AT" >> "$GITHUB_ENV"
          gh workflow run ci.yml --ref "$RELEASE_BRANCH"

      - name: Wait for CI to register and complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Filter by created>=DISPATCH_AT so we never lock onto a stale
          # historical run (release/<tag> branch names can be recycled).
          deadline=$((SECONDS + 180))
          RUN_ID=""
          while [ $SECONDS -lt $deadline ]; do
            RUN_ID=$(gh run list \
              --workflow=ci.yml \
              --branch "$RELEASE_BRANCH" \
              --event workflow_dispatch \
              --created ">=$DISPATCH_AT" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty' 2>/dev/null || true)
            if [ -n "$RUN_ID" ]; then
              break
            fi
            sleep 5
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::CI workflow_dispatch run did not register within 180s."
            exit 1
          fi
          echo "Watching CI run $RUN_ID (dispatched at $DISPATCH_AT)..."
          gh run watch "$RUN_ID" --exit-status

      - name: Bridge CI to legacy Status for ruleset gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Repository rulesets on personal repos evaluate the
          # required_status_checks rule against the legacy Statuses API,
          # NOT the modern Checks API. GitHub Actions reports its result
          # only as a check_run, so the ruleset stays unsatisfied even
          # though CI is green. Mirror our successful check_run as a
          # status with the same context so the rule is satisfied.
          PR_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid --jq '.headRefOid')
          gh api -X POST "repos/${GITHUB_REPOSITORY}/statuses/${PR_SHA}" \
            -f state=success \
            -f context=build-and-test \
            -f description="CI passed via workflow_dispatch run"

      - name: Squash-merge release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "$PR_NUMBER" --squash --delete-branch

      # --- Tag the merged commit on main ---
      - name: Tag the merged commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Tag the squash commit this PR actually produced. Tagging the tip of
          # main after a pull races with anything merged in the meantime — an
          # unrelated commit could end up tagged as the release.
          MERGE_SHA=$(gh pr view "$PR_NUMBER" --json mergeCommit --jq '.mergeCommit.oid')
          if [ -z "$MERGE_SHA" ] || [ "$MERGE_SHA" = "null" ]; then
            echo "::error::Could not resolve the merge commit for PR #${PR_NUMBER}."
            exit 1
          fi
          git fetch origin main
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME" "$MERGE_SHA"
          git push origin "$TAG_NAME"

      # --- GitHub Release with binary artifacts ---
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            Frameworks/Syphon.xcframework.zip
            Frameworks/checksum.txt
          generate_release_notes: true
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          body: |
            ## Syphon.xcframework

            Checksum (SHA256): `${{ env.CHECKSUM }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Notify metaphor-cli to bump its Syphon.xcframework pin (stable only) ---
      # metaphor-cli pins this repo's Syphon Release URL + checksum in its
      # Package.swift. On every stable release that rebuilds Syphon, fire a
      # repository_dispatch so metaphor-cli can open a pin-bump PR automatically
      # (see CONTRACT.md, L2a). Requires a PAT with `repo` scope on
      # shinyaoguri/metaphor-cli stored as the CLI_DISPATCH_TOKEN secret; the
      # step is skipped (with a notice) when the secret is absent.
      - name: Dispatch Syphon pin bump to metaphor-cli
        if: env.IS_PRERELEASE == 'false'
        env:
          CLI_DISPATCH_TOKEN: ${{ secrets.CLI_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLI_DISPATCH_TOKEN:-}" ]; then
            echo "::notice::CLI_DISPATCH_TOKEN not set — skipping metaphor-cli Syphon pin dispatch."
            exit 0
          fi
          gh api -X POST repos/shinyaoguri/metaphor-cli/dispatches \
            -H "Authorization: token ${CLI_DISPATCH_TOKEN}" \
            -f event_type=syphon-release \
            -f "client_payload[tag]=${TAG_NAME}" \
            -f "client_payload[checksum]=${CHECKSUM}"
          echo "Dispatched syphon-release (tag=${TAG_NAME}) to metaphor-cli."
