name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # --- Syphon build ---
      - name: Get Syphon submodule hash
        id: syphon-hash
        run: echo "hash=$(git submodule status Vendor/Syphon-Framework | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Cache Syphon.xcframework
        id: cache-syphon
        uses: actions/cache@v5
        with:
          path: Frameworks/Syphon.xcframework
          key: syphon-xcframework-${{ steps.syphon-hash.outputs.hash }}-${{ hashFiles('scripts/build-syphon.sh') }}

      - name: Build Syphon.xcframework
        if: steps.cache-syphon.outputs.cache-hit != 'true'
        run: ./scripts/build-syphon.sh

      - name: Create ZIP and checksum
        run: |
          cd Frameworks
          zip -r Syphon.xcframework.zip Syphon.xcframework
          shasum -a 256 Syphon.xcframework.zip > checksum.txt
          echo "CHECKSUM=$(awk '{print $1}' checksum.txt)" >> $GITHUB_ENV

      # --- Version bump ---
      - name: Compute next version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          case "${{ github.event.inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          TAG_NAME="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $TAG_NAME"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      # --- Update Package.swift, commit, THEN tag ---
      - name: Update Package.swift and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i '' "s|releases/download/v[^/]*/|releases/download/${TAG_NAME}/|g" Package.swift
          sed -i '' "s|checksum: \"[^\"]*\"|checksum: \"${CHECKSUM}\"|g" Package.swift
          VERSION_NUM=${TAG_NAME#v}
          sed -i '' "s|from: \"[0-9]*\.[0-9]*\.[0-9]*\"|from: \"${VERSION_NUM}\"|g" README.md
          git add Package.swift README.md
          git diff --cached --quiet || git commit -m "Release ${TAG_NAME}"
          git push origin main

      - name: Create tag on updated commit
        run: |
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"

      # --- GitHub Release ---
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            Frameworks/Syphon.xcframework.zip
            Frameworks/checksum.txt
          generate_release_notes: true
          body: |
            ## Syphon.xcframework

            Checksum (SHA256): `${{ env.CHECKSUM }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
