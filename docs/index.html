<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>metaphor - Swift + Metal Creative Coding</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A creative coding library for Swift + Metal, inspired by p5.js and Processing">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'metaphor',
      repo: 'https://github.com/shinyaoguri/metaphor',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: 'Search...',
        noData: 'No results',
        depth: 3,
      },
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied',
      },
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-swift.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-c.min.js"></script>
</body>
</html>
